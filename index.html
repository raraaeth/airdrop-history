<!DOCTYPE html><html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Airdrop History</title><style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: Arial, sans-serif;
        background: #f5f7fb;
        color: #333;
    }

    .container {
        max-width: 1100px;
        margin: auto;
        padding: 30px 20px;
    }

    h1 {
        text-align: center;
        margin-bottom: 25px;
    }

    .stats {
        display: flex;
        justify-content: center;
        gap: 20px;
        flex-wrap: wrap;
        margin-bottom: 30px;
    }

    .card {
        background: white;
        width: 220px;
        padding: 20px;
        border-radius: 12px;
        text-align: center;
        box-shadow: 0 2px 10px rgba(0,0,0,.08);
    }

    .card h2 {
        margin-bottom: 8px;
        font-size: 28px;
    }

    .table-wrapper {
        background: white;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 2px 10px rgba(0,0,0,.08);
    }

    table {
        width: 100%;
        border-collapse: collapse;
    }

    thead {
        background: #222;
        color: white;
    }

    th,
    td {
        padding: 12px;
        text-align: center;
        border-bottom: 1px solid #eee;
    }

    tbody tr:hover {
        background: #f9f9f9;
    }

    .footer {
        text-align: center;
        margin-top: 20px;
        color: #666;
        font-size: 14px;
    }

    @media (max-width: 768px) {
        .card {
            width: 100%;
        }

        table {
            font-size: 14px;
        }

        th,
        td {
            padding: 8px;
        }
    }
</style>

</head><body><div class="container"><h1>🎁 My Airdrop History</h1>

<div class="stats">

    <div class="card">
        <h2 id="totalReward">$0</h2>
        <p>Total Airdrop</p>
    </div>

    <div class="card">
        <h2 id="totalProject">0</h2>
        <p>Total Project</p>
    </div>

</div>

<div class="table-wrapper">
    <table id="airdropTable">
        <thead></thead>
        <tbody></tbody>
    </table>
</div>

<div class="footer">
    Updated automatically from airdrops.csv
</div>

</div><script>

fetch('airdrops.csv')
.then(response => response.text())
.then(data => {

    const lines = data.trim().split('\n');

    const headers = lines[0].split(',');

    const thead = document.querySelector('#airdropTable thead');
    const tbody = document.querySelector('#airdropTable tbody');

    let headerRow = '<tr>';

    headers.forEach(header => {
        headerRow += `<th>${header}</th>`;
    });

    headerRow += '</tr>';

    thead.innerHTML = headerRow;

    let totalReward = 0;
    let totalProject = 0;

    lines.slice(1).forEach(line => {

        if (!line.trim()) return;

        const cols = line.split(',');

        let row = '<tr>';

        cols.forEach(col => {
            row += `<td>${col}</td>`;
        });

        row += '</tr>';

        tbody.innerHTML += row;

        const estimate = Number(cols[3]);

        if (!isNaN(estimate)) {
            totalReward += estimate;
        }

        totalProject++;
    });

    document.getElementById('totalReward').innerText =
        '$' + totalReward.toLocaleString();

    document.getElementById('totalProject').innerText =
        totalProject;

});

</script></body>
</html>
