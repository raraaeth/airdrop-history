<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎁 My Airdrop History</title><style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#f5f7fb;
    color:#333;
}

.container{
    max-width:1100px;
    margin:auto;
    padding:30px 20px;
}

h1{
    text-align:center;
    margin-bottom:30px;
}

.stats{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
    margin-bottom:30px;
}

.card{
    background:white;
    width:220px;
    padding:20px;
    border-radius:12px;
    text-align:center;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.card h2{
    margin-bottom:8px;
    font-size:28px;
}

.table-wrapper{
    background:white;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
}

table{
    width:100%;
    border-collapse:collapse;
}

thead{
    background:#222;
    color:white;
}

th,td{
    padding:12px;
    text-align:center;
    border-bottom:1px solid #eee;
}

tbody tr:hover{
    background:#f9f9f9;
}

.footer{
    text-align:center;
    margin-top:20px;
    color:#777;
    font-size:14px;
}

.loading{
    text-align:center;
    padding:30px;
}

</style></head><body><div class="container"><h1>🎁 My Airdrop History</h1>

<div class="stats">

    <div class="card">
        <h2 id="totalReward">$0</h2>
        <p>Total Airdrop</p>
    </div>

    <div class="card">
        <h2 id="totalProject">0</h2>
        <p>Total Project</p>
    </div>

</div>

<div class="table-wrapper">

    <table id="airdropTable">

        <thead>
            <tr>
                <th>Tanggal</th>
                <th>Project</th>
                <th>Reward</th>
                <th>Estimasi ($)</th>
            </tr>
        </thead>

        <tbody id="tableBody">
            <tr>
                <td colspan="4" class="loading">
                    Loading...
                </td>
            </tr>
        </tbody>

    </table>

</div>

<div class="footer">
    Data source: Google Sheets
</div>

</div><script>

const API_URL =
'https://opensheet.elk.sh/1fNCPN1FcOcHQHWm7Dkua-s7H5M7s0k2wphP7tnrA8Sc/airdrop';

fetch(API_URL)
.then(response => response.json())
.then(data => {

    const tbody = document.getElementById('tableBody');

    tbody.innerHTML = '';

    let totalReward = 0;

    data.forEach(item => {

        const estimasi = Number(item.Estimasi) || 0;

        totalReward += estimasi;

        tbody.innerHTML += `
        <tr>
            <td>${item.Tanggal}</td>
            <td>${item.Project}</td>
            <td>${item.Reward}</td>
            <td>$${estimasi}</td>
        </tr>
        `;
    });

    document.getElementById('totalReward')
        .innerText = '$' + totalReward.toLocaleString();

    document.getElementById('totalProject')
        .innerText = data.length;

})
.catch(error => {

    document.getElementById('tableBody').innerHTML = `
    <tr>
        <td colspan="4">
            Failed to load data
        </td>
    </tr>
    `;

    console.error(error);

});

</script></body>
</html>
